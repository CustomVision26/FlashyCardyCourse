name: iOS TestFlight

# Builds a signed iOS app and uploads it to TestFlight.
#
# Run manually from the Actions tab (workflow_dispatch). Requires these repo
# secrets (Settings → Secrets and variables → Actions → Secrets):
#   IOS_DIST_CERT_P12_BASE64   base64 of your Apple Distribution .p12
#   IOS_DIST_CERT_PASSWORD     password used when exporting the .p12
#   APPSTORE_API_KEY_ID        App Store Connect API key ID
#   APPSTORE_ISSUER_ID         App Store Connect issuer ID
#   APPSTORE_API_PRIVATE_KEY   full contents of the AuthKey_XXXX.p8 file
#   APPLE_TEAM_ID              your 10-character Apple Developer Team ID
# And one repo variable:
#   CAPACITOR_SERVER_URL       https://your-production-url

on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-26
    env:
      CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL }}
      APP_BUNDLE_ID: com.flipvise.app
      KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      PROFILE_NAME: "Flipvise App Store CI"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sanitize signing inputs
        run: |
          {
            echo "KEY_ID=$(printf '%s' "$KEY_ID" | tr -d '[:space:]')"
            echo "ISSUER_ID=$(printf '%s' "$ISSUER_ID" | tr -d '[:space:]')"
            echo "TEAM_ID=$(printf '%s' "$TEAM_ID" | tr -d '[:space:]')"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform
        run: npm run cap:add:ios

      - name: Apply native iOS customizations
        run: npm run cap:ios:postadd

      - name: Generate app icon & splash
        run: npm run cap:assets:ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" ios/App/App/Info.plist

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Write App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$API_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_${KEY_ID}.p8"

      - name: Create & install App Store provisioning profile
        run: |
          export ASC_KEY_ID="$KEY_ID"
          export ASC_ISSUER_ID="$ISSUER_ID"
          export ASC_P8_PATH="$HOME/private_keys/AuthKey_${KEY_ID}.p8"
          export APP_BUNDLE_ID="$APP_BUNDLE_ID"
          export OUT_PATH="$RUNNER_TEMP/flipvise.mobileprovision"
          node scripts/asc-create-profile.mjs
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/flipvise.mobileprovision" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/flipvise.mobileprovision"

      - name: Archive
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Validate IPA
        run: |
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n 1)
          echo "Validating $IPA"
          xcrun altool --validate-app -f "$IPA" -t ios \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n 1)
          echo "Uploading $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
