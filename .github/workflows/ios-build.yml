name: iOS Build

# Builds the Capacitor iOS app on a macOS runner. This lets you compile and
# verify the iOS app without owning a Mac.
#
# The ios/ Xcode project is generated fresh on each run (it is not committed),
# then patched with the custom ExternalBrowser plugin + Info.plist tweaks via
# scripts/ios-postadd.mjs.
#
# Set the production server URL as a repo variable (Settings → Secrets and
# variables → Actions → Variables): CAPACITOR_SERVER_URL = https://your-app.vercel.app
# The build still succeeds without it (the app just won't have a server URL baked in).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ios-native/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build:
    runs-on: macos-15
    env:
      CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform
        run: npm run cap:add:ios

      - name: Apply native iOS customizations
        run: npm run cap:ios:postadd

      - name: Generate app icon & splash
        run: npm run cap:assets:ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build (unsigned, simulator SDK)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
